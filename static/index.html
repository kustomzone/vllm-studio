<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vLLM Studio</title>
    <link rel="stylesheet" href="/static/css/reset.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/components.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo">vLLM Studio</span>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-item active" data-view="dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item" data-view="chat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span>Chat</span>
                </div>
                <div class="nav-item" data-view="logs">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    <span>Logs</span>
                </div>
                <div class="nav-item" data-view="recipes">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    <span>Recipes</span>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="flex items-center gap-2 text-sm text-muted">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-text">Connecting...</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <button class="btn btn-ghost btn-icon" id="menuToggle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="flex items-center gap-3">
                    <button class="btn btn-secondary" onclick="App.refresh()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                        Refresh
                    </button>
                    <button class="btn btn-danger" onclick="App.evictModel()">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><rect x="6" y="6" width="12" height="12"/></svg>
                        Evict
                    </button>
                </div>
            </header>

            <div class="main-body">
                <!-- Dashboard View -->
                <div id="dashboard-view" class="view">
                    <div class="grid grid-2 mb-4">
                        <div class="card card-highlight">
                            <div class="card-header">
                                <h2 class="card-title">Current Model</h2>
                            </div>
                            <div id="current-model">
                                <div class="model-name text-muted">Loading...</div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <h2 class="card-title">System Status</h2>
                            </div>
                            <div id="system-status">
                                <p class="text-muted">Loading...</p>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title">Quick Launch</h2>
                            <button class="btn btn-sm btn-secondary" onclick="App.showView('recipes')">
                                View All
                            </button>
                        </div>
                        <div class="recipe-list" id="recipe-quick-list">
                            <p class="text-muted">Loading recipes...</p>
                        </div>
                    </div>
                </div>

                <!-- Chat View -->
                <div id="chat-view" class="view hidden">
                    <div class="chat-container">
                        <div class="chat-messages" id="chat-messages">
                            <div class="text-center text-muted" style="padding: 2rem;">
                                <p>Start a conversation with the model</p>
                            </div>
                        </div>
                        <div class="chat-input-container">
                            <form id="chat-form" class="chat-input-wrapper">
                                <textarea
                                    id="chat-input"
                                    class="chat-input"
                                    placeholder="Type a message..."
                                    rows="1"
                                ></textarea>
                                <button type="submit" class="chat-send-btn">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Logs View -->
                <div id="logs-view" class="view hidden">
                    <div class="grid grid-2">
                        <div class="card">
                            <div class="card-header">
                                <h2 class="card-title">Log Files</h2>
                            </div>
                            <div class="recipe-list" id="log-files">
                                <p class="text-muted">Loading...</p>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <h2 class="card-title">Log Output</h2>
                            </div>
                            <div class="logs-container" id="log-content">
                                <div class="log-line text-muted">Select a log file to view</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recipes View -->
                <div id="recipes-view" class="view hidden">
                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title">Recipes</h2>
                            <button class="btn btn-primary" onclick="Recipes.openModal()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                New Recipe
                            </button>
                        </div>
                        <div class="recipe-list" id="recipes-list">
                            <p class="text-muted">Loading recipes...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Recipe Modal -->
    <div class="modal-overlay" id="recipe-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="recipe-modal-title">New Recipe</h3>
                <button class="modal-close" onclick="Recipes.closeModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <form id="recipe-form" onsubmit="event.preventDefault(); Recipes.save();">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Recipe ID</label>
                        <input type="text" name="id" class="form-input" required placeholder="my-model">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Display Name</label>
                        <input type="text" name="name" class="form-input" required placeholder="My Model">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Model Path</label>
                    <input type="text" name="model_path" class="form-input" required placeholder="/mnt/llm_models/...">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Backend</label>
                        <select name="backend" class="form-select">
                            <option value="vllm">vLLM</option>
                            <option value="sglang">SGLang</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tensor Parallel</label>
                        <input type="number" name="tensor_parallel_size" class="form-input" value="1" min="1" max="8">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Pipeline Parallel</label>
                        <input type="number" name="pipeline_parallel_size" class="form-input" value="1" min="1" max="8">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Max Model Length</label>
                        <input type="number" name="max_model_len" class="form-input" value="32768">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">GPU Memory Utilization</label>
                        <input type="number" name="gpu_memory_utilization" class="form-input" value="0.85" step="0.01" min="0.1" max="0.99">
                    </div>
                    <div class="form-group">
                        <label class="form-label">KV Cache Dtype</label>
                        <select name="kv_cache_dtype" class="form-select">
                            <option value="auto">auto</option>
                            <option value="fp8">fp8</option>
                            <option value="fp8_e4m3">fp8_e4m3</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Tool Call Parser</label>
                        <input type="text" name="tool_call_parser" class="form-input" placeholder="hermes, mistral, etc.">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Quantization</label>
                        <input type="text" name="quantization" class="form-input" placeholder="auto-round, awq, etc.">
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="Recipes.closeModal()">Cancel</button>
                    <button type="button" class="btn btn-danger hidden" id="recipe-delete-btn" onclick="Recipes.delete()">Delete</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
