version: '3.8'

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: vllm-studio-chat
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://app.homelabai:8080/v1
      - OPENAI_API_KEY=sk-homelabai-3fe751380eb7ac8701f670bee4a56b8ebff8365c68828faa
      - WEBUI_AUTH=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - openwebui_data:/app/backend/data
    restart: unless-stopped

volumes:
  openwebui_data:
