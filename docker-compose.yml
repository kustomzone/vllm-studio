version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://homelabai.org}
    container_name: vllm-studio-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://homelabai.org}
      - API_KEY=${API_KEY:-sk-homelabai-3fe751380eb7ac8701f670bee4a56b8ebff8365c68828faa}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
