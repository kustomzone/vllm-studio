name: vllm-studio
options:
  bundleIdPrefix: com.vllm
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false

targets:
  vllm-studio:
    type: application
    platform: iOS
    sources:
      - path: sources
        type: group
    info:
      path: resources/info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sero.vllmstudio
      MARKETING_VERSION: "0.1"
      CURRENT_PROJECT_VERSION: 1
      SWIFT_VERSION: "5.9"
      DEVELOPMENT_TEAM: 953GG2G474
      CODE_SIGN_STYLE: Automatic
      INFOPLIST_FILE: resources/info.plist
      SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO

  vllm-studio-mac:
    type: application
    platform: macOS
    sources:
      - path: sources
        type: group
    info:
      path: resources/info-mac.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sero.vllmstudio.mac
      MARKETING_VERSION: "0.1"
      CURRENT_PROJECT_VERSION: 1
      SWIFT_VERSION: "5.9"
      DEVELOPMENT_TEAM: 953GG2G474
      CODE_SIGN_STYLE: Automatic
      INFOPLIST_FILE: resources/info-mac.plist
      CODE_SIGN_ENTITLEMENTS: resources/vllm-studio-mac.entitlements
    scheme:
      testTargets:
        - vllm-studio-mac-tests

  vllm-studio-mac-tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: tests
        type: group
    dependencies:
      - target: vllm-studio-mac
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sero.vllmstudio.mac.tests
      SWIFT_VERSION: "5.9"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGNING_ALLOWED: NO
