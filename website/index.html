<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vLLM Studio Download</title>
    <meta
      name="description"
      content="Download fresh prebuilt vLLM Studio release artifacts from GitHub."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <p class="eyebrow">vLLM Studio</p>
      <h1>Download.</h1>
      <p class="lede">Fresh canonical release builds.</p>

      <div class="actions">
        <a id="download-link" href="https://github.com/0xSero/vllm-studio/releases/latest">Latest release</a>
        <a id="all-releases-link" href="https://github.com/0xSero/vllm-studio/releases">All releases</a>
      </div>

      <section class="section">
        <h2>Latest published version</h2>
        <p id="release-version">Loading latest release…</p>
      </section>

      <section class="section">
        <h2>Direct downloads</h2>
        <p id="release-status">Fetching release assets…</p>
        <ul id="asset-list"></ul>
      </section>

      <section class="section">
        <h2>Notes</h2>
        <p>Desktop app + bundled server.</p>
        <p>macOS + Linux first.</p>
        <p>No envs. No keys.</p>
      </section>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
